<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Get Help with SyllabusAI</title>
    <meta name="description"
        content="Have questions or feedback? Contact the SyllabusAI support team. We're here to help you optimize your study schedule.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="light-mode">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Syllabus<span>AI</span></a>
            <ul class="nav-links">
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#pricing">Pricing</a></li>
                <li><a href="auth.html" class="btn btn-outline">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding: 4rem 2rem;">
        <h1 class="gradient-text">Contact Support</h1>
        <div style="max-width: 600px; margin: 0 auto; margin-top: 2.5rem;">
            <div class="feature-card" style="text-align: left;">
                <form>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.875rem; font-weight: 600;">Your
                            Name</label>
                        <input type="text"
                            style="width: 100%; padding: 0.875rem 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; color: var(--text-main); outline: none;"
                            placeholder="Full Name">
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.875rem; font-weight: 600;">Email
                            Address</label>
                        <input type="email"
                            style="width: 100%; padding: 0.875rem 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; color: var(--text-main); outline: none;"
                            placeholder="name@university.edu">
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.875rem; font-weight: 600;">Message</label>
                        <textarea
                            style="width: 100%; padding: 0.875rem 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1rem; color: var(--text-main); outline: none; min-height: 150px;"
                            placeholder="How can we help?"></textarea>
                    </div>
                    <button type="button" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    <p style="font-size: 0.875rem; color: var(--text-muted); margin-top: 1.5rem; text-align: center;">Or
                        email us directly at <strong>support@syllabus-ai.com</strong></p>
                </form>
            </div>

            <a href="index.html" class="back-link"
                style="display: block; text-align: center; margin-top: 2rem; color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: 500;">←
                Back to home</a>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 SyllabusAI. Built for Students.
            </div>
        </div>
    </footer>
</body>

</html>
