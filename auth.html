<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | SyllabusAI - Your AI Study Companion</title>
    <meta name="description"
        content="Log in to SyllabusAI to access your personalized study plans, track your academic progress, and manage your course syllabi with ease.">
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(79, 70, 229, 0.1), transparent),
                radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.1), transparent);
        }

        .auth-card {
            background: white;
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 3.5rem 3rem;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .auth-header {
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            color: var(--text-main);
            outline: none;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .social-auth {
            margin-top: 2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 2rem;
        }

        .social-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1rem;
            background: white;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            padding: 0.875rem;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn:hover {
            background: #f8fafc;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body class="light-mode">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo"
                    style="display: inline-block; margin-bottom: 1rem;">Syllabus<span>AI</span></a>
                <h2>Welcome back</h2>
                <p>Enter your details to access your study hub</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="name@university.edu" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Sign In to
                    Dashboard</button>
            </form>

            <div class="social-auth">
                <button class="social-btn">
                    <img src="https://www.google.com/favicon.ico" width="20" alt="G"> Continue with Google
                </button>
            </div>

            <a href="index.html" class="back-link">← Return to Landing Page</a>
        </div>
    </div>
</body>

</html>
